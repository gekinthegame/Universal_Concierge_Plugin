name: Release

# One-click install, first cut (DECISIONS.md 0013): tag a version → build the
# self-contained `concierge-plugin` binary for each OS/arch → publish a GitHub
# Release with archives + checksums that `install.sh` / `install.ps1` download.
# Native signed installers (.dmg/.msi/AppImage) are a fast-follow.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: # lets you cut a build without tagging (no release is published)

permissions:
  contents: write # required to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: concierge-plugin-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset: concierge-plugin-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: concierge-plugin-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: concierge-plugin-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked -p concierge-plugin --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          stage="${{ matrix.asset }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/concierge-plugin" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          tar -czf "${{ matrix.asset }}.tar.gz" "$stage"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          stage="${{ matrix.asset }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/concierge-plugin.exe" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          7z a "${{ matrix.asset }}.zip" "$stage" >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip
          if-no-files-found: error

  macos-dmg:
    name: macOS .dmg (clickable installer)
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: concierge-plugin-macos-*
          path: dl
          merge-multiple: true

      - name: Build universal app + .dmg
        shell: bash
        run: |
          tar -xzf dl/concierge-plugin-macos-arm64.tar.gz
          tar -xzf dl/concierge-plugin-macos-x64.tar.gz
          # One universal binary (Apple Silicon + Intel) inside one .app.
          lipo -create -output concierge-plugin \
            concierge-plugin-macos-arm64/concierge-plugin \
            concierge-plugin-macos-x64/concierge-plugin
          bash packaging/macos/build-dmg.sh concierge-plugin crates/gui/src/logo.png "Universal-Concierge-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Universal-Concierge-macos.dmg
          if-no-files-found: error

  windows-installer:
    name: Windows installer (.exe)
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: concierge-plugin-windows-x64
          path: dl

      - name: Build setup.exe (Inno Setup)
        shell: pwsh
        run: |
          Expand-Archive -Path dl/concierge-plugin-windows-x64.zip -DestinationPath unpacked
          $stage = "win-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "unpacked/concierge-plugin-windows-x64/concierge-plugin.exe" "$stage/"
          Copy-Item "packaging/windows/concierge.iss" "$stage/"
          Copy-Item "packaging/windows/launch.vbs" "$stage/"

          # Icon (.ico) from the logo via ImageMagick (pre-installed, else choco).
          $magick = (Get-Command magick -ErrorAction SilentlyContinue).Source
          if (-not $magick) {
            choco install imagemagick -y --no-progress | Out-Null
            $magick = (Get-ChildItem "C:\Program Files\ImageMagick*\magick.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          & $magick "crates/gui/src/logo.png" -background none -define "icon:auto-resize=256,128,64,48,32,16" "$stage/icon.ico"

          # Inno Setup.
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress | Out-Null }
          & $iscc "$stage/concierge.iss"
          Copy-Item "$stage/Universal-Concierge-windows-setup.exe" .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Universal-Concierge-windows-setup.exe
          if-no-files-found: error

  release:
    name: publish release
    needs: [build, macos-dmg, windows-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4 # for install.sh / install.ps1

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums + stage install scripts
        shell: bash
        run: |
          cp install.sh install.ps1 dist/
          cd dist
          sha256sum concierge-plugin-* Universal-Concierge-macos.dmg Universal-Concierge-windows-setup.exe > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Universal Concierge Plugin — ${{ github.ref_name }}

            A self-contained binary: no separate `mem`, database, or cloud. Kubo/IPFS
            is optional (only for publishing/the Sidekick). The app captures and
            explores a harness's activity — it is inert without one.

            ### 🖱️ Click to install (recommended)
            **macOS** — download **`Universal-Concierge-macos.dmg`**, open it, drag
            **Concierge → Applications**. First launch: **right-click → Open** (one
            time — unsigned; or **System Settings → Privacy & Security → Open Anyway**).

            **Windows** — download **`Universal-Concierge-windows-setup.exe`** and run
            it (Start Menu + desktop icon). SmartScreen may warn (unsigned): click
            **More info → Run anyway**.

            Either way, clicking the **Concierge** icon starts the explorer and opens
            it in your browser (Brave/Opera if installed).

            ### Command-line install (macOS / Linux)
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh
            ```
            ### Windows (PowerShell)
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```

            > **Unsigned (first cut).** Not yet code-signed/notarized — hence the
            > one-time right-click → Open on macOS. (The `curl` script avoids the
            > prompt because curl doesn't set quarantine.) Signed `.dmg` / `.msi`
            > installers are a fast-follow once a Developer ID is in place.
