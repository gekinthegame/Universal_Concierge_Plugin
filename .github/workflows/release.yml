name: Release

# One-click install, first cut (DECISIONS.md 0013): tag a version → build the
# self-contained `concierge-plugin` binary for each OS/arch → publish a GitHub
# Release with archives + checksums that `install.sh` / `install.ps1` download.
# Native signed installers (.dmg/.msi/AppImage) are a fast-follow.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: # lets you cut a build without tagging (no release is published)

permissions:
  contents: write # required to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: concierge-plugin-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset: concierge-plugin-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: concierge-plugin-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: concierge-plugin-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked -p concierge-plugin --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          stage="${{ matrix.asset }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/concierge-plugin" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          tar -czf "${{ matrix.asset }}.tar.gz" "$stage"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          stage="${{ matrix.asset }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/concierge-plugin.exe" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          7z a "${{ matrix.asset }}.zip" "$stage" >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4 # for install.sh / install.ps1

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums + stage install scripts
        shell: bash
        run: |
          cp install.sh install.ps1 dist/
          cd dist
          sha256sum concierge-plugin-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Universal Concierge Plugin — ${{ github.ref_name }}

            A self-contained binary: no separate `mem`, database, or cloud. Kubo/IPFS
            is optional (only for publishing/the Sidekick). The app captures and
            explores a harness's activity — it is inert without one.

            ### Install (macOS / Linux)
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh
            ```
            ### Install (Windows, PowerShell)
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```
            Then run `concierge-plugin gui`.

            > **Unsigned (first cut).** These builds are **not yet code-signed or
            > notarized** — community review welcome. The install script downloads
            > via `curl`, which does **not** set macOS quarantine, so Gatekeeper
            > does not block it. If you instead download from the browser, clear the
            > flag with `xattr -dr com.apple.quarantine <path>`. Signed installers
            > (.dmg / .msi / AppImage) are a fast-follow.
